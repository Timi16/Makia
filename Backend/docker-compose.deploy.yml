services:
  api-1:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  api-2:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/workers/exportWorker.js"]
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api-1
      - api-2
    ports:
      - "8080:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ebookmaker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_deploy_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    volumes:
      - redis_deploy_data:/data

volumes:
  postgres_deploy_data:
  redis_deploy_data:
